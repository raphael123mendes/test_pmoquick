<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ADEK — Strategic Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="stylesheet" href="styles/app.css"/>
</head>
<body class="bg-surface text-on-background min-h-screen">

  <!-- ── TOP NAV ── -->
  <header class="fixed top-0 w-full z-50 bg-[#f9f9fa]/95 backdrop-blur-xl border-b border-surface-container">
    <div class="flex items-center justify-between px-6 h-16 max-w-screen-xl mx-auto">
      <div class="flex items-center gap-4">
        <button id="btn-back" onclick="App.goBack()" class="text-primary active:scale-95 transition-transform">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <span class="font-headline font-black text-xl tracking-tighter text-on-background">ADEK</span>
      </div>
      <nav class="hidden md:flex items-center gap-1">
        <button onclick="App.showPage('overview')"    class="nav-item px-4 py-2 text-[11px] font-bold uppercase tracking-widest text-secondary hover:text-primary transition-colors relative" data-page="overview">Overview<span class="nav-dot"></span></button>
        <button onclick="App.showPage('initiatives')" class="nav-item px-4 py-2 text-[11px] font-bold uppercase tracking-widest text-secondary hover:text-primary transition-colors relative" data-page="initiatives">Initiatives<span class="nav-dot"></span></button>
        <button onclick="App.showPage('kpis')"        class="nav-item px-4 py-2 text-[11px] font-bold uppercase tracking-widest text-secondary hover:text-primary transition-colors relative" data-page="kpis">KPIs<span class="nav-dot"></span></button>
        <button onclick="App.showPage('risks')"       class="nav-item px-4 py-2 text-[11px] font-bold uppercase tracking-widest text-secondary hover:text-primary transition-colors relative" data-page="risks">Risks<span class="nav-dot"></span></button>
      </nav>
      <div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center text-xs font-bold select-none">AD</div>
    </div>
  </header>

  <!-- ── PAGE CONTAINERS ── -->
  <main class="pt-20 pb-24 md:pb-8 min-h-screen">
    <div id="page-overview"          class="page px-6 max-w-screen-xl mx-auto py-8"></div>
    <div id="page-initiatives"       class="page px-6 max-w-screen-xl mx-auto py-8"></div>
    <div id="page-initiative-detail" class="page px-6 max-w-screen-xl mx-auto py-8"></div>
    <div id="page-project-detail"    class="page px-6 max-w-screen-xl mx-auto py-8"></div>
    <div id="page-kpis"              class="page px-6 max-w-screen-xl mx-auto py-8"></div>
    <div id="page-kpi-detail"        class="page px-6 max-w-screen-xl mx-auto py-8"></div>
    <div id="page-risks"             class="page px-6 max-w-screen-xl mx-auto py-8"></div>

    <!-- Loading state -->
    <div id="app-loading" class="fixed inset-0 flex items-center justify-center bg-surface z-50">
      <div class="text-center">
        <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin mx-auto mb-4"></div>
        <p class="text-secondary text-sm font-medium">Loading portfolio data…</p>
      </div>
    </div>
  </main>

  <!-- ── BOTTOM NAV (mobile) ── -->
  <nav class="md:hidden fixed bottom-0 left-0 w-full bg-[#f9f9fa]/95 backdrop-blur-2xl flex justify-around items-center px-4 pb-6 pt-3 z-50 border-t border-surface-container">
    <button onclick="App.showPage('overview')"    class="bottom-nav-item flex flex-col items-center gap-1 text-secondary opacity-60" data-page="overview">
      <span class="material-symbols-outlined">dashboard</span>
      <span class="text-[10px] uppercase tracking-widest font-bold">Overview</span>
    </button>
    <button onclick="App.showPage('initiatives')" class="bottom-nav-item flex flex-col items-center gap-1 text-secondary opacity-60" data-page="initiatives">
      <span class="material-symbols-outlined">rocket_launch</span>
      <span class="text-[10px] uppercase tracking-widest font-bold">Initiatives</span>
    </button>
    <button onclick="App.showPage('kpis')"        class="bottom-nav-item flex flex-col items-center gap-1 text-secondary opacity-60" data-page="kpis">
      <span class="material-symbols-outlined">query_stats</span>
      <span class="text-[10px] uppercase tracking-widest font-bold">KPIs</span>
    </button>
    <button onclick="App.showPage('risks')"       class="bottom-nav-item flex flex-col items-center gap-1 text-secondary opacity-60" data-page="risks">
      <span class="material-symbols-outlined">warning</span>
      <span class="text-[10px] uppercase tracking-widest font-bold">Risks</span>
    </button>
  </nav>

  <!-- ── SCRIPTS (order matters) ── -->
  <script src="pages/overview.js"></script>
  <script src="pages/initiatives.js"></script>
  <script src="pages/initiative-detail.js"></script>
  <script src="pages/project-detail.js"></script>
  <script src="pages/kpis.js"></script>
  <script src="pages/kpi-detail.js"></script>
  <script src="pages/risks.js"></script>
  <script src="app.js"></script>
</body>
</html>
